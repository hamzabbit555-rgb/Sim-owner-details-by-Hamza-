<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIM DATABASE | DEVELOPED BY HAMZA</title>
    <style>
        /* Design by Hamza */dding: 0; box-sizing: border-box; }
        body { 
            background-color: #050505; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #00ff00; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #0a0a0a;
            border: 1px solid #00ff00;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ff00;
        }

        .tagline {
            background: #00ff00;
            color: #000;
            display: inline-block;
            padding: 3px 15px;
            font-weight: bold;
            font-size: 12px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .btn-search {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #00ff00, #008000);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-search:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px #00ff00;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #555;
        }

        #loading {
            margin-top: 20px;
            display: none;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-top: 3px solid #00ff00;
            border-radius: 50%;
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>SIM DATABASE</h1>
            <div class="tagline">BY HAMZA</div>
        </div>

        <div class="input-box">
            <input type="number" id="phone" placeholder="Enter Number (03xxxxxxxxx)">
        </div>

        <button class="btn-search" onclick="searchData()">Search Details</button>

        <div id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #fff;">Connecting to Hamza Secure Server...</p>
        </div>

        <div class="footer">
            Developed with ❤️ by Hamza <br>
            © 2026 All Rights Reserved
        </div>
    </div>

    <script>
        function searchData() {
            var input = document.getElementById('phone').value;
            var loader = document.getElementById('loading');
            
            if(input.length < 10) {
                alert("Please enter a correct 11-digit number!");
                return;
            }

            loader.style.display = "block";
            
            setTimeout(function() {
                loader.innerHTML = "<p style='color: #ff4444; font-weight: bold;'>Error: API Connection Failed!</p><p style='font-size:12px; color:#888;'>Server is busy. Please contact Hamza for premium access.</p>";
            }, 3000);
        }
    </script>

</body>
</html>
